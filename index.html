<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>Premium iOS Scoreboard</title>

<!-- Nhúng font chữ chuyên dụng -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&family=Outfit:wght@600;800&display=swap" rel="stylesheet">

<style>
:root {
    /* MÀU SẮC CHÍNH XÁC THEO YÊU CẦU */
    --bg-grad: linear-gradient(135deg, #E8EEF5 0%, #C9D6E8 100%);
    --card-bg: rgba(255, 255, 255, 0.55);
    --text-main: #111827;  /* Số điểm xanh đậm */
    --accent: #2563EB;     /* Điểm nhấn xanh biển hiện đại */
    --btn-plus: #22C55E;    /* Nút + xanh lá dịu */
    --btn-minus: #EF4444;   /* Nút - đỏ cam nhẹ */
}

* { 
    box-sizing: border-box; 
    -webkit-tap-highlight-color: transparent; 
}

body {
    margin: 0;
    background: var(--bg-grad);
    background-attachment: fixed;
    color: var(--text-main);
    height: 100vh;
    height: 100dvh;
    display: flex;
    justify-content: center;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    font-weight: 400; /* Mặc định chữ phụ dùng Inter 400 */
}

.wrap {
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
}

/* TOP APP BAR */
.top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    flex-shrink: 0;
}
.top h1 {
    margin: 0;
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
    font-size: 28px;
    color: var(--accent); /* Điểm nhấn xanh biển */
}

.top-actions { display: flex; gap: 8px; align-items: center; }

.top .btn-add {
    height: 38px;
    padding: 0 14px;
    border: 1px solid rgba(255, 255, 255, 0.6);
    border-radius: 30px;
    background: rgba(255, 255, 255, 0.5);
    color: var(--accent);
    font-family: 'Outfit', sans-serif;
    font-weight: 600; /* Nút phụ dùng Outfit 600 */
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: transform 0.15s ease, background-color 0.15s ease;
}
.top .btn-add:active { transform: scale(0.95); background: rgba(255, 255, 255, 0.8); }

/* LƯỚI CONTAINER TỰ ĐỘNG CHIA ĐỀU KHÔNG GIAN KHÔNG TRÀN */
#list {
    display: flex;
    flex-direction: column;
    gap: 14px;
    flex: 1;
    margin-bottom: 110px; /* Nhường chỗ cho bottom bar */
    min-height: 0;
}

/* CARD KÍNH TRẮNG MỜ + BO GÓC 35PX + BÓNG MỀM CO CAO CẤP */
.card {
    background: var(--card-bg);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    border: 1px solid rgba(255, 255, 255, 0.7);
    border-radius: 35px; /* Yêu cầu bo góc lớn 35px */
    padding: 14px 20px;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    flex: 1;
    min-height: 0;
    box-shadow: 0 15px 35px rgba(31, 38, 135, 0.04); /* Bóng mềm */
}

.card-top-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
}

/* TÊN CƠ THỦ (OUTFIT 600) */
.player-info {
    width: 55%;
    min-width: 0;
}
input.name {
    background: none;
    border: none;
    color: var(--text-main);
    font-family: 'Outfit', sans-serif;
    font-weight: 600; 
    font-size: 20px;
    width: 100%;
    padding: 2px 0;
    text-align: left;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
input.name:focus { outline: none; border-bottom: 2px solid var(--accent); }

/* LỊCH SỬ DẠNG DANH SÁCH NHỎ (INTER 400) */
.history-box {
    display: flex;
    gap: 4px;
    justify-content: flex-end;
    align-items: center;
    width: 45%;
    overflow: hidden;
}
.log-tag {
    font-family: 'Inter', sans-serif;
    font-weight: 400; /* Yêu cầu chữ phụ Inter 400 */
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 8px;
    background: rgba(0, 0, 0, 0.05);
    color: #4b5563;
    animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.2);
}

/* SỐ ĐIỂM: 110PX XANH ĐẬM #111827 (OUTFIT 800) */
.score-display {
    font-family: 'Outfit', sans-serif;
    font-weight: 800; /* Yêu cầu số điểm Outfit 800 */
    font-size: 110px; 
    font-size: min(110px, 15vh); /* Tự động co giãn theo chiều cao màn hình để không bị dính */
    text-align: center;
    color: var(--text-main);
    line-height: 1;
    margin: auto 0;
    user-select: none;
}

/* NÚT BẤM DẠNG PILL (VIÊN THUỐC) - OUTFIT 600 */
.controls { 
    display: flex; 
    gap: 14px; 
    justify-content: center;
    flex-shrink: 0;
}

.btn {
    flex: 1;
    max-width: 130px;
    height: 40px;
    border: none;
    border-radius: 100px; /* Dạng viên thuốc (pill) */
    font-family: 'Outfit', sans-serif;
    font-weight: 600; /* Yêu cầu nút Outfit 600 */
    font-size: 18px;
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.4);
}

/* Animation khi bấm nảy nhẹ cực đã tay */
.btn:active { 
    transform: scale(0.86); 
}
.btn-minus { background: var(--btn-minus); box-shadow: 0 6px 15px rgba(239, 68, 68, 0.2); }
.btn-plus { background: var(--btn-plus); box-shadow: 0 6px 15px rgba(34, 197, 94, 0.2); }

/* THAO TÁC XÓA (VUỐT HOẶC HOVER THẤY KHÁ ĐẸP) */
.card-actions {
    position: absolute;
    bottom: 12px;
    right: 20px;
    z-index: 2;
    opacity: 0.15;
    transition: opacity 0.2s;
}
.card:hover .card-actions, .card:active .card-actions { opacity: 1; }

.del-btn {
    background: none;
    border: none;
    color: var(--btn-minus);
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 11px;
    cursor: pointer;
    padding: 0;
}

.icon { width: 15px; height: 15px; fill: currentColor; }
.btn-icon { width: 20px; height: 20px; fill: currentColor; }

/* BOTTOM DASHBOARD */
.total {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: rgba(255, 255, 255, 0.4);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid rgba(255, 255, 255, 0.5);
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    z-index: 999;
    border-radius: 35px 35px 0 0; /* Bo góc trên đồng bộ */
    box-shadow: 0 -10px 30px rgba(0,0,0,0.02);
}
.total-label {
    font-family: 'Inter', sans-serif;
    font-weight: 400; /* Chữ phụ Inter 400 */
    font-size: 11px;
    color: #4b5563;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.glow-circle {
    background: rgba(255, 255, 255, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.8);
    min-width: 120px;
    height: 36px;
    border-radius: 30px;
    display: flex;
    justify-content: center;
    align-items: center;
}
.big { 
    font-family: 'Outfit', sans-serif;
    font-weight: 800; /* Số điểm tổng Outfit 800 */
    font-size: 22px; 
    color: var(--accent); /* Đổi màu đồng bộ điểm nhấn */
}

.total button.btn-reset {
    background: none;
    border: none;
    color: #4b5563;
    font-family: 'Outfit', sans-serif;
    font-weight: 600; /* Nút phụ dùng Outfit 600 */
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
}
.total button.btn-reset:active { color: var(--btn-minus); transform: scale(0.95); }

@keyframes popIn {
    from { opacity: 0; transform: scale(0.8) translateY(4px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
}
</style>
</head>
<body>

<div class="wrap">
    <div class="top">
        <h1>Scoreboard</h1>
        <div class="top-actions">
            <button class="btn-add" onclick="add()">
                <svg class="icon" viewBox="0 0 24 24"><path d="M19 11H13V5H11V11H5V13H11V19H13V13H19V11Z"/></svg> Thêm người
            </button>
        </div>
    </div>
    
    <div id="list"></div>
</div>

<div class="total">
    <div class="total-label">Tổng số điểm toàn bàn</div>
    <div class="glow-circle">
        <div id="tot" class="big">0</div>
    </div>
    <button class="btn-reset" onclick="reset()">
        <svg class="icon" viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg> Làm mới trận
    </button>
</div>

<script>
let a = [{"name":"Cơ thủ 1","score":0,"history":[]},{"name":"Cơ thủ 2","score":0,"history":[]}];

if(localStorage.bida_ios_premium) {
    try { a = JSON.parse(localStorage.bida_ios_premium); } catch(e) {}
}

function save(){ 
    localStorage.bida_ios_premium = JSON.stringify(a); 
}

function draw(){
    let listNode = document.getElementById('list');
    listNode.innerHTML = '';
    
    let t = 0;
    a.forEach((x, i) => {
        t += x.score;
        if(!x.history) x.history = []; // Bảo vệ dữ liệu cũ
        
        listNode.innerHTML += `
        <div class="card">
            <div class="card-top-row">
                <div class="player-info">
                    <input class="name" value="${x.name}" onchange="a[${i}].name=this.value;save()">
                </div>
                <div class="history-box">
                    ${x.history.map(h => `<span class="log-tag">${h}</span>`).join('')}
                </div>
            </div>
            
            <div class="score-display">
                ${x.score}
            </div>
            
            <div class="controls">
                <button class="btn btn-minus" onclick="chg(${i},-1)">
                    <svg class="btn-icon" viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"/></svg>
                </button>
                <button class="btn btn-plus" onclick="chg(${i},1)">
                    <svg class="btn-icon" viewBox="0 0 24 24"><path d="M19 11H13V5H11V11H5V13H11V19H13V13H19V11Z"/></svg>
                </button>
            </div>

            <div class="card-actions">
                <button class="del-btn" onclick="removePlayer(${i})">XÓA</button>
            </div>
        </div>`;
    });
    document.getElementById('tot').innerHTML = t;
    save();
}

function chg(i, d){
    a[i].score += d;
    // Ghi nhận lịch sử dạng tag nhỏ nhỏ (+1, -1)
    a[i].history.push(d > 0 ? `+${d}` : `${d}`);
    if(a[i].history.length > 3) a[i].history.shift(); // Lưu tối đa 3 hoạt động gần nhất
    draw();
}

function add(){
    if (a.length >= 5) {
        alert("Ứng dụng hỗ trợ tối đa 5 hàng ở phong cách iOS này để bảo toàn kích cỡ chữ điểm 110px siêu đẹp!");
        return;
    }
    a.push({name: 'Cơ thủ ' + (a.length + 1), score: 0, history: []});
    draw();
}

function removePlayer(i){
    if(confirm(`Xóa cơ thủ "${a[i].name}"?`)){
        a.splice(i, 1);
        draw();
    }
}

function reset(){
    if(confirm("Làm mới lại toàn bộ điểm số và lịch sử?")){
        a.forEach(x => {
            x.score = 0;
            x.history = [];
        });
        draw();
    }
}

draw();
</script>

</body>
</html>
