<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b1220;--card:rgba(255,255,255,.08);--text:#fff;--accent:#5b8cff}
*{box-sizing:border-box}body{margin:0;font-family:Outfit,sans-serif;background:linear-gradient(160deg,#0b1220,#1b2945);color:#fff}
.wrap{max-width:700px;margin:auto;padding:16px}.top{display:flex;justify-content:space-between;align-items:center}
.card{background:var(--card);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.08);border-radius:30px;padding:18px;margin:18px 0}
input.name{width:100%;background:none;border:none;color:#fff;text-align:center;font-size:22px;font-weight:700}
.score{text-align:center;font-size:100px;font-weight:900;line-height:1;margin:12px 0}
.controls{display:flex;gap:14px;margin-bottom:12px}.controls button{flex:1;padding:18px;border:none;border-radius:18px;font-size:28px;font-weight:800;color:#fff;cursor:pointer}
.m{background:#ef4444}.p{background:#22c55e}
.foul-btn{width:100%;padding:14px;border:none;border-radius:14px;font-size:16px;font-weight:700;color:#fff;background:linear-gradient(135deg, #f59e0b, #d97706);cursor:pointer;text-transform:uppercase}
.total{position:sticky;bottom:10px;background:#111a;backdrop-filter:blur(10px);border-radius:22px;padding:18px;text-align:center;font-size:22px}
.big{font-size:48px;font-weight:900;margin-bottom:10px}
.total button{padding:10px 24px;border:none;border-radius:12px;background:#5b8cff;color:#fff;font-size:16px;font-weight:700;cursor:pointer}
</style></head><body><div class=wrap><div class=top><h2>🎱 Bida Score</h2><button onclick="add()" style="padding:8px 16px;border:none;border-radius:10px;background:var(--accent);color:#fff;font-weight:700;cursor:pointer">+ Người</button></div><div id=list></div><div class=total>Tổng điểm bàn đấu<div id=tot class=big>0</div><button onclick="reset()">Reset</button></div></div>
<script>
let a=JSON.parse(localStorage.bida2||'[{"name":"Tài","score":0},{"name":"Bạn","score":0}]');
function save(){localStorage.bida2=JSON.stringify(a)}
function draw(){list.innerHTML='';let t=0;a.forEach((x,i)=>{t+=x.score;list.innerHTML+=`<div class=card><input class=name value="${x.name}" onchange="a[${i}].name=this.value;save()"><div class=score>${x.score>0?'+':''}${x.score}</div><div class=controls><button class=m onclick="chg(${i},-1)">-1</button><button class=p onclick="chg(${i},1)">+1</button></div><button class=foul-btn onclick="chg(${i},-1)">⚠️ Bắn Đền (-1)</button></div>`});
tot.innerHTML=t;save();}
function chg(i,d){a[i].score+=d;draw();}
function add(){a.push({name:'Người '+(a.length+1),score:0});draw();}
function reset(){if(confirm("Xóa trận cũ, đấu trận mới chứ?")){a.forEach(x=>x.score=0);draw();}}
draw();
</script></body></html>
