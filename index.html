<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>SCORE - Glassmorphism Edition</title>

<!-- Nhúng các font chữ từ Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&family=Outfit:wght@600;800&display=swap" rel="stylesheet">

<style>
/* ĐỊNH NGHĨA BIẾN MÀU THEO CHẾ ĐỘ NỀN (GLASSMORPHISM) */
body.light-theme {
    --bg-gradient: linear-gradient(135deg, #e0e7ff 0%, #fef3c7 100%);
    --card-bg: rgba(255, 255, 255, 0.4);
    --card-border: rgba(255, 255, 255, 0.5);
    --card-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.06);
    --text-main: #1e293b;
    --text-muted: #475569;
    --btn-theme-bg: rgba(255, 255, 255, 0.5);
    --btn-p-bg: #1e293b;
    --btn-m-bg: rgba(239, 68, 68, 0.15);
    --btn-m-text: #dc2626;
}

body.dark-theme {
    --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
    --card-bg: rgba(22, 27, 38, 0.4);
    --card-border: rgba(255, 255, 255, 0.08);
    --card-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --btn-theme-bg: rgba(255, 255, 255, 0.08);
    --btn-p-bg: #f8fafc;
    --btn-m-bg: rgba(239, 68, 68, 0.25);
    --btn-m-text: #fca5a5;
}

* { 
    box-sizing: border-box; 
    -webkit-tap-highlight-color: transparent; 
    transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease, backdrop-filter 0.3s ease;
}

body {
    margin: 0;
    background: var(--bg-gradient);
    background-attachment: fixed;
    color: var(--text-main);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    font-weight: 400;
}

.wrap {
    width: 100%;
    max-width: 500px;
    margin: 0 auto;
    padding: 20px 16px calc(10px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    height: 100vh;
}

/* TOP APP BAR */
.top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    flex-shrink: 0;
}
.top h1 {
    margin: 0;
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
    font-size: 30px;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.top-actions { display: flex; gap: 10px; align-items: center; }

.theme-toggle {
    width: 44px;
    height: 44px;
    border-radius: 30px;
    border: 1px solid var(--card-border);
    background: var(--btn-theme-bg);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: var(--text-main);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}

.top .btn-add {
    height: 44px;
    padding: 0 16px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 30px;
    background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
    color: #fff;
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(99, 102, 241, 0.25);
    display: flex;
    align-items: center;
    gap: 6px;
}
.top button:active { transform: scale(0.95); opacity: 0.9; }

/* DANH SÁCH CUỘN KHÔNG GIỚI HẠN */
#list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    flex: 1;
    margin-bottom: 16px;
    overflow-y: auto;   /* Cho phép cuộn khi tràn màn hình */
    padding-right: 2px; /* Chừa khoảng nhỏ tránh lệch hiệu ứng */
    
    /* Ẩn thanh cuộn mặc định của trình duyệt để giữ độ đẹp của kính mờ */
    -ms-overflow-style: none;
    scrollbar-width: none;
}
#list::-webkit-scrollbar {
    display: none;
}

/* THẺ CƠ THỦ KÍNH MỜ CỐ ĐỊNH CHIỀU CAO VỪA VẶN */
.card {
    background: var(--card-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 24px;
    padding: 12px 20px;
    position: relative;
    display: flex;
    align-items: center;
    height: 85px; /* Chiều cao cố định lý tưởng để cuộn mượt */
    box-shadow: var(--card-shadow);
    border: 1px solid var(--card-border);
    flex-shrink: 0; /* Không cho thẻ bị bóp méo khi danh sách dài ra */
}

/* TÊN CHIẾM 45% */
.player-info {
    width: 45%;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

input.name {
    background: none;
    border: none;
    color: var(--text-main);
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 20px;
    width: 100%;
    padding: 2px 0;
    text-align: left;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
input.name:focus { outline: none; border-bottom: 2px solid #6366f1; }

/* BỘ ĐIỀU KHIỂN & ĐIỂM CHIẾM 55% */
.inline-controls {
    width: 55%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
}

.inline-controls button {
    width: 44px;
    height: 44px;
    border: 1px solid var(--card-border);
    border-radius: 30px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

.m { color: var(--btn-m-text) !important; background: var(--btn-m-bg) !important; }
.m:active { transform: scale(0.9); }

.p { 
    background-color: var(--btn-p-bg) !important; 
    color: var(--card-bg) !important;
}
body.dark-theme .p { color: #0f172a !important; }
.p:active { transform: scale(0.9); filter: brightness(0.9); }

/* SỐ ĐIỂM */
.score {
    flex: 1;
    text-align: center;
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
    font-size: 38px; 
    line-height: 1;
    letter-spacing: -1px;
}

/* THAO TÁC PHỤ NẰM GỌN GÀNG */
.card-actions {
    position: absolute;
    top: 6px;
    right: 18px;
    z-index: 2;
    opacity: 0.3;
    transition: opacity 0.2s;
}
.card:hover .card-actions, .card:active .card-actions { opacity: 1; }

.del-btn {
    background: none;
    border: none;
    color: #ef4444;
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 0.5px;
    cursor: pointer;
    padding: 0;
}

/* ICONS */
.icon { width: 16px; height: 16px; fill: currentColor; }
.btn-icon { width: 22px; height: 22px; fill: currentColor; }

/* BOTTOM DASHBOARD (NẰM DƯỚI CÙNG TỰ NHIÊN, KHÔNG CHE KHUẤT) */
.total {
    position: relative;
    width: 100%;
    background: var(--card-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--card-border);
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    z-index: 999;
    border-radius: 24px;
    box-shadow: var(--card-shadow);
    flex-shrink: 0; /* Giữ nguyên chiều cao khối tổng */
}

.total-label {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
}

.glow-circle {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid var(--card-border);
    min-width: 140px;
    height: 40px;
    border-radius: 30px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.big { 
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
    font-size: 24px; 
    background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.total button {
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 16px;
    border-radius: 30px;
}
.total button:active { color: #ef4444; background: rgba(239, 68, 68, 0.1); }
</style>
</head>
<body class="light-theme">

<div class="wrap">
    <div class="top">
        <h1>Scoreboard</h1>
        <div class="top-actions">
            <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">
                <svg class="icon" viewBox="0 0 24 24"><path d="M10 2c-1.82 0-3.53.5-5 1.35C7.99 5.08 10 8.3 10 12s-2.01 6.92-5 8.65C6.47 21.5 8.18 22 10 22c5.52 0 10-4.48 10-10S15.52 2 10 2z"/></svg>
            </button>
            <button class="btn-add" onclick="add()">
                <svg class="icon" viewBox="0 0 24 24"><path d="M19 11H13V5H11V11H5V13H11V19H13V13H19V11Z"/></svg> Thêm người
            </button>
        </div>
    </div>
    
    <!-- Vùng danh sách người chơi tự sinh thanh cuộn -->
    <div id="list"></div>

    <!-- Thanh tổng điểm cố định ngay ngắn ở đáy wrap -->
    <div class="total">
        <div class="total-label">Tổng số điểm toàn bàn</div>
        <div class="glow-circle">
            <div id="tot" class="big">0</div>
        </div>
        <button onclick="reset()">
            <svg class="icon" viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg> Làm mới trận
    </div>
</div>

<script>
let players = [{"name":"Cơ thủ 1","score":0},{"name":"Cơ thủ 2","score":0}];

if(localStorage.bida_theme) {
    document.body.className = localStorage.bida_theme;
}
if(localStorage.bida_glass) {
    try { players = JSON.parse(localStorage.bida_glass); } catch(e) {}
}

function save(){ 
    localStorage.bida_glass = JSON.stringify(players); 
    localStorage.bida_theme = document.body.className;
}

function toggleTheme() {
    const body = document.body;
    body.className = body.classList.contains('light-theme') ? 'dark-theme' : 'light-theme';
    updateThemeIcon();
    save();
}

function updateThemeIcon() {
    const isDark = document.body.classList.contains('dark-theme');
    document.getElementById('themeBtn').innerHTML = isDark ? 
        `<svg class="icon" viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1z"/></svg>` : 
        `<svg class="icon" viewBox="0 0 24 24"><path d="M10 2c-1.82 0-3.53.5-5 1.35C7.99 5.08 10 8.3 10 12s-2.01 6.92-5 8.65C6.47 21.5 8.18 22 10 22c5.52 0 10-4.48 10-10S15.52 2 10 2z"/></svg>`;
}

function initRender(){
    let listNode = document.getElementById('list');
    listNode.innerHTML = '';
    updateThemeIcon();

    players.forEach((x, i) => {
        listNode.innerHTML += `
        <div class="card" id="card-${i}">
            <div class="card-actions">
                <button class="del-btn" onclick="removePlayer(${i})">XÓA</button>
            </div>
            <div class="player-info">
                <input class="name" value="${x.name}" oninput="updateName(${i}, this.value)">
            </div>
            <div class="inline-controls">
                <button class="m" onclick="chg(${i},-1)">
                    <svg class="btn-icon" viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"/></svg>
                </button>
                <div class="score" id="score-${i}">
                    ${x.score > 0 ? '+' : ''}${x.score}
                </div>
                <button class="p" onclick="chg(${i},1)">
                    <svg class="btn-icon" viewBox="0 0 24 24"><path d="M19 11H13V5H11V11H5V13H11V19H13V13H19V11Z"/></svg>
                </button>
            </div>
        </div>`;
    });
    updateTotalScore();
}

function updateName(index, val) {
    players[index].name = val;
    save();
}

function chg(i, d){
    if (window.navigator && window.navigator.vibrate) {
        window.navigator.vibrate(15);
    }
    players[i].score += d;
    document.getElementById(`score-${i}`).innerText = (players[i].score > 0 ? '+' : '') + players[i].score;
    updateTotalScore();
    save();
}

function updateTotalScore() {
    let t = players.reduce((sum, item) => sum + item.score, 0);
    document.getElementById('tot').innerText = t;
}

function add(){
    players.push({name: 'Cơ thủ ' + (players.length + 1), score: 0});
    initRender();
    save();
    
    // Tự động cuộn xuống dưới cùng danh sách khi thêm người mới
    setTimeout(() => {
        let listNode = document.getElementById('list');
        listNode.scrollTo({ top: listNode.scrollHeight, behavior: 'smooth' });
    }, 50);
}

function removePlayer(i){
    if(confirm(`Xóa cơ thủ "${players[i].name}"?`)){
        players.splice(i, 1);
        initRender();
        save();
    }
}

function reset(){
    if(confirm("Làm mới lại toàn bộ điểm số?")){
        players.forEach((x, i) => {
            x.score = 0;
            const scoreNode = document.getElementById(`score-${i}`);
            if(scoreNode) scoreNode.innerText = '0';
        });
        updateTotalScore();
        save();
    }
}

initRender();
</script>

</body>
</html>
