<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>SCORE - Times New Roman Pure</title>

<style>
/* ĐỊNH NGHĨA BIẾN MÀU THEO CHẾ ĐỘ NỀN */
body.light-theme {
    --bg: #f3f4f6;
    --card-bg: #ffffff;
    --text-main: #1e293b;
    --text-muted: #64748b;
    --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
    --border: rgba(0, 0, 0, 0.05);
    --btn-theme-bg: #e2e8f0;
    --score-color: #1e293b;
    --btn-p-bg: #1e293b;
}

body.dark-theme {
    --bg: #0b0f19;
    --card-bg: #161b26;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
    --border: rgba(255, 255, 255, 0.05);
    --btn-theme-bg: #2d3748;
    --score-color: #f8fafc;
    --btn-p-bg: #2d3748;
}

* { 
    box-sizing: border-box; 
    -webkit-tap-highlight-color: transparent; 
    transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    /* Font Times New Roman toàn hệ thống */
    font-family: "Times New Roman", Times, Baskerville, Georgia, serif;
}

body {
    margin: 0;
    background-color: var(--bg);
    color: var(--text-main);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.wrap {
    width: 100%;
    max-width: 500px;
    margin: 0 auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

/* TOP APP BAR */
.top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    flex-shrink: 0;
}
.top h1 {
    margin: 0;
    font-size: 32px;
    font-weight: bold;
    font-style: italic;
    background: linear-gradient(135deg, #ff6b6b 0%, #ff8e53 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.top-actions { display: flex; gap: 8px; align-items: center; }

.theme-toggle {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    border: none;
    background: var(--btn-theme-bg);
    color: var(--text-main);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}

.top .btn-add {
    height: 40px;
    padding: 0 14px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #ff6b6b 0%, #ff8e53 100%);
    color: #fff;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(255, 107, 107, 0.2);
    display: flex;
    align-items: center;
    gap: 6px;
}
.top button:active { transform: scale(0.95); opacity: 0.9; }

/* LƯỚI CHIA NGANG ĐỀU NHAU FULL MÀN HÌNH */
#list {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
    flex: 1;
    margin-bottom: 130px;
}

#list.count-1 { grid-template-rows: 1fr; }
#list.count-2 { grid-template-rows: repeat(2, 1fr); }
#list.count-3 { grid-template-rows: repeat(3, 1fr); }
#list.count-4 { grid-template-rows: repeat(4, 1fr); }
#list.count-5 { grid-template-rows: repeat(5, 1fr); }
#list.count-6 { grid-template-rows: repeat(6, 1fr); }

/* THẺ CƠ THỦ */
.card {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 10px 16px;
    position: relative;
    display: flex;
    align-items: center;
    height: 100%;
    box-shadow: var(--card-shadow);
    border: 1px solid var(--border);
}

/* TÊN CHIẾM CHÍNH XÁC 45% (GỌN MỘT NỬA BÊN TRÁI) */
.player-info {
    width: 45%;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

input.name {
    background: none;
    border: none;
    color: var(--text-main);
    font-size: 22px;
    font-weight: bold;
    width: 100%;
    padding: 2px 0;
    text-align: left;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
input.name:focus { outline: none; border-bottom: 2px solid #ff6b6b; }

/* BỘ ĐIỀU KHIỂN & ĐIỂM CHIẾM 55% RỘNG RÃI */
.inline-controls {
    width: 55%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
}

.inline-controls button {
    width: 46px;
    height: 46px;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

.m { color: #ef4444 !important; background: #fee2e2 !important; }
body.dark-theme .m { background: rgba(239, 68, 68, 0.2) !important; }
.m:active { transform: scale(0.9); }

.p { background-color: var(--btn-p-bg) !important; color: #fff !important; }
.p:active { transform: scale(0.9); filter: brightness(0.9); }

/* KHU VỰC CHỮ SỐ ĐIỂM SỐ SIÊU TO RỘNG RÃI */
.score {
    flex: 1;
    text-align: center;
    font-size: 48px; 
    font-weight: bold;
    line-height: 1;
    color: var(--score-color);
}

/* ĐIỀU CHỈNH THEO SỐ LƯỢNG HÀNG */
.count-5 .score, .count-6 .score { font-size: 36px; }
.count-5 .inline-controls button, .count-6 .inline-controls button { width: 40px; height: 40px; border-radius: 10px; }
.count-5 input.name, .count-6 input.name { font-size: 18px; }

/* THAO TÁC PHỤ */
.card-actions {
    position: absolute;
    top: 4px;
    right: 16px;
    z-index: 2;
    opacity: 0.2;
    transition: opacity 0.2s;
}
.card:hover .card-actions, .card:active .card-actions { opacity: 1; }

.del-btn {
    background: none;
    border: none;
    color: #ef4444;
    font-size: 13px;
    font-weight: bold;
    cursor: pointer;
    padding: 0;
}

/* ICONS */
.icon { width: 14px; height: 14px; fill: currentColor; }
.btn-icon { width: 22px; height: 22px; fill: currentColor; }

/* BOTTOM DASHBOARD */
.total {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 500px;
    background: var(--card-bg);
    border-top: 1px solid var(--border);
    padding: 16px 16px calc(16px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    z-index: 999;
    border-radius: 24px 24px 0 0;
    box-shadow: 0 -10px 30px rgba(0,0,0,0.04);
}
.total-label {
    font-size: 13px;
    font-weight: bold;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.glow-circle {
    background: var(--bg);
    border: 1px solid var(--border);
    min-width: 140px;
    height: 42px;
    border-radius: 14px;
    display: flex;
    justify-content: center;
    align-items: center;
}
.big { 
    font-size: 26px; 
    font-weight: bold; 
    background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.total button {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    margin-top: 4px;
    border-radius: 8px;
}
.total button:active { color: #ef4444; }
</style>
</head>
<body class="light-theme">

<div class="wrap">
    <div class="top">
        <h1>Scoreboard</h1>
        <div class="top-actions">
            <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">
                <svg class="icon" viewBox="0 0 24 24"><path d="M10 2c-1.82 0-3.53.5-5 1.35C7.99 5.08 10 8.3 10 12s-2.01 6.92-5 8.65C6.47 21.5 8.18 22 10 22c5.52 0 10-4.48 10-10S15.52 2 10 2z"/></svg>
            </button>
            <button class="btn-add" onclick="add()">
                <svg class="icon" viewBox="0 0 24 24"><path d="M19 11H13V5H11V11H5V13H11V19H13V13H19V11Z"/></svg> Thêm người
            </button>
        </div>
    </div>
    
    <div id="list"></div>
</div>

<div class="total">
    <div class="total-label">Tổng số điểm toàn bàn</div>
    <div class="glow-circle">
        <div id="tot" class="big">0</div>
    </div>
    <button onclick="reset()">
        <svg class="icon" viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg> Làm mới trận
    </button>
</div>

<script>
let a = [{"name":"Cơ thủ 1","score":0},{"name":"Cơ thủ 2","score":0}];

if(localStorage.bida_theme) {
    document.body.className = localStorage.bida_theme;
}
if(localStorage.bida_pure) {
    try { a = JSON.parse(localStorage.bida_pure); } catch(e) {}
}

function save(){ 
    localStorage.bida_pure = JSON.stringify(a); 
    localStorage.bida_theme = document.body.className;
}

function toggleTheme() {
    const body = document.body;
    if(body.classList.contains('light-theme')) {
        body.className = 'dark-theme';
    } else {
        body.className = 'light-theme';
    }
    draw();
}

function draw(){
    let listNode = document.getElementById('list');
    listNode.innerHTML = '';
    listNode.className = 'count-' + Math.min(a.length, 6);
    
    const isDark = document.body.classList.contains('dark-theme');
    document.getElementById('themeBtn').innerHTML = isDark ? 
        `<svg class="icon" viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1z"/></svg>` : 
        `<svg class="icon" viewBox="0 0 24 24"><path d="M10 2c-1.82 0-3.53.5-5 1.35C7.99 5.08 10 8.3 10 12s-2.01 6.92-5 8.65C6.47 21.5 8.18 22 10 22c5.52 0 10-4.48 10-10S15.52 2 10 2z"/></svg>`;

    let t = 0;
    a.forEach((x, i) => {
        t += x.score;
        
        listNode.innerHTML += `
        <div class="card">
            <div class="card-actions">
                <button class="del-btn" onclick="removePlayer(${i})">XÓA</button>
            </div>
            
            <div class="player-info">
                <input class="name" value="${x.name}" onchange="a[${i}].name=this.value;save()">
            </div>
            
            <div class="inline-controls">
                <button class="m" onclick="chg(${i},-1)">
                    <svg class="btn-icon" viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"/></svg>
                </button>
                <div class="score">
                    ${x.score > 0 ? '+' : ''}${x.score}
                </div>
                <button class="p" onclick="chg(${i},1)">
                    <svg class="btn-icon" viewBox="0 0 24 24"><path d="M19 11H13V5H11V11H5V13H11V19H13V13H19V11Z"/></svg>
                </button>
            </div>
        </div>`;
    });
    document.getElementById('tot').innerHTML = t;
    save();
}

function chg(i, d){
    a[i].score += d;
    draw();
}

function add(){
    if (a.length >= 6) {
        alert("Ứng dụng hỗ trợ tối đa 6 hàng để đảm bảo trải nghiệm hiển thị tốt nhất!");
        return;
    }
    a.push({name: 'Cơ thủ ' + (a.length + 1), score: 0});
    draw();
}

function removePlayer(i){
    if(confirm(`Xóa cơ thủ "${a[i].name}"?`)){
        a.splice(i, 1);
        draw();
    }
}

function reset(){
    if(confirm("Làm mới lại toàn bộ điểm số?")){
        a.forEach(x => x.score = 0);
        draw();
    }
}

draw();
</script>

</body>
</html>
