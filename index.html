<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SCORE">
<title>SCORE - Billiards Scoreboard</title>

<!-- Đã cập nhật v4 để ép trình duyệt load code mới -->
<link rel="manifest" href="manifest.json?v=4">
<link rel="apple-touch-icon" href="icon-512.png?v=4">

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;800&display=swap" rel="stylesheet">

<style>
body.light-theme { --bg-gradient: linear-gradient(145deg, #f1f5f9 0%, #f8fafc 100%); --card-bg: rgba(255, 255, 255, 0.55); --card-border: rgba(255, 255, 255, 0.7); --card-shadow: 0 10px 40px -10px rgba(148, 163, 184, 0.12); --text-main: #0f172a; }
body.dark-theme { --bg-gradient: linear-gradient(145deg, #090d16 0%, #0f172a 100%); --card-bg: rgba(30, 41, 59, 0.35); --card-border: rgba(255, 255, 255, 0.04); --card-shadow: 0 16px 40px -12px rgba(0, 0, 0, 0.4); --text-main: #f8fafc; }
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
body { margin: 0; background: var(--bg-gradient); color: var(--text-main); height: 100vh; overflow: hidden; font-family: 'Outfit', sans-serif; position: fixed; width: 100%; }
.wrap { width: 100%; max-width: 480px; margin: 0 auto; padding: 20px; display: flex; flex-direction: column; height: 100vh; }
#list { display: flex; flex-direction: column; gap: 14px; flex: 1; overflow-y: auto; }
.card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 20px; padding: 20px; display: flex; align-items: center; justify-content: space-between; position: relative; }
.score-wrapper { position: relative; display: flex; align-items: center; gap: 15px; }
.score { font-weight: 800; font-size: 36px; min-width: 60px; text-align: center; }
.pop-emoji { position: fixed; font-size: 30px; z-index: 9999; pointer-events: none; animation: floatUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
@keyframes floatUp { 0% { opacity: 0; transform: translateY(0) scale(0.5); } 50% { opacity: 1; transform: translateY(-50px) scale(1.3); } 100% { opacity: 0; transform: translateY(-100px) scale(1); } }
button { border: none; background: rgba(128,128,128,0.1); border-radius: 50%; width: 45px; height: 45px; font-size: 20px; font-weight: bold; cursor: pointer; }
</style>
</head>
<body class="light-theme">

<div class="wrap">
    <div style="font-size: 24px; font-weight: 800; margin-bottom: 20px;">SCOREBOARD</div>
    <div id="list"></div>
</div>

<script>
let players = [{ name: "Cơ thủ 1", score: 0 }, { name: "Cơ thủ 2", score: 0 }];

function render() {
    const list = document.getElementById('list');
    list.innerHTML = '';
    players.forEach((p, i) => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
            <div style="font-weight:600">${p.name}</div>
            <div class="score-wrapper">
                <button onclick="changeScore(${i}, -1)">-</button>
                <div class="score" id="score-${i}">${p.score}</div>
                <button onclick="changeScore(${i}, 1)">+</button>
            </div>
        `;
        list.appendChild(div);
    });
}

function changeScore(i, val) {
    players[i].score += val;
    const scoreEl = document.getElementById(`score-${i}`);
    scoreEl.innerText = players[i].score;
    
    // Tọa độ để Emoji bay từ đúng vị trí số điểm
    const rect = scoreEl.getBoundingClientRect();
    const emoji = document.createElement('div');
    emoji.className = 'pop-emoji';
    emoji.innerText = val > 0 ? '😊' : '😭';
    emoji.style.left = rect.left + (rect.width/2 - 15) + 'px';
    emoji.style.top = rect.top + 'px';
    
    document.body.appendChild(emoji);
    setTimeout(() => emoji.remove(), 800);
    localStorage.bida_players = JSON.stringify(players);
}

if (localStorage.bida_players) players = JSON.parse(localStorage.bida_players);
render();
</script>
</body>
</html>
