<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>SCORE - Modern Minimalist Board</title>

<style>
:root {
    --bg: #0b0f17;
    --card-bg: #161b26;
    --text-main: #ffffff;
    --text-muted: #64748b;
    --accent: #3b82f6; /* Xanh Công Nghệ Hiện Đại */
    --border: rgba(255, 255, 255, 0.05);
    --shadow: rgba(0, 0, 0, 0.3);
}

* { 
    box-sizing: border-box; 
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
    -webkit-tap-highlight-color: transparent; 
}

body {
    margin: 0;
    background-color: var(--bg);
    color: var(--text-main);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.wrap {
    width: 100%;
    max-width: 500px;
    margin: 0 auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

/* TOP APP BAR */
.top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    flex-shrink: 0;
}
.top h1 {
    margin: 0;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
}

.top-actions { display: flex; gap: 8px; }
.top button {
    height: 38px;
    padding: 0 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--card-bg);
    color: var(--text-main);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 6px;
}
.top button:active { transform: scale(0.96); background: rgba(255,255,255,0.05); }

/* LƯỚI CHIA NGANG ĐỀU NHAU FULL MÀN HÌNH */
#list {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    flex: 1;
    margin-bottom: 120px;
}

#list.count-1 { grid-template-rows: 1fr; }
#list.count-2 { grid-template-rows: repeat(2, 1fr); }
#list.count-3 { grid-template-rows: repeat(3, 1fr); }
#list.count-4 { grid-template-rows: repeat(4, 1fr); }
#list.count-5 { grid-template-rows: repeat(5, 1fr); }
#list.count-6 { grid-template-rows: repeat(6, 1fr); }

/* THÈ CƠ THỦ - SANG TRỌNG & TỐI GIẢN */
.card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 8px 20px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    overflow: hidden;
    height: 100%;
    box-shadow: 0 4px 20px var(--shadow);
}

.player-info {
    flex: 1;
    display: flex;
    align-items: center;
    min-width: 0;
}

input.name {
    background: none;
    border: none;
    color: var(--text-main);
    font-size: 18px;
    font-weight: 600;
    width: 100%;
    padding: 4px 0;
    text-align: left;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
input.name:focus { outline: none; border-bottom: 1.5px solid var(--accent); }

/* BỘ ĐIỀU KHIỂN HÀNG NGANG TỐI GIẢN */
.inline-controls {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
}

.inline-controls button {
    width: 44px;
    height: 44px;
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text-main);
    background: rgba(255, 255, 255, 0.03);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.1s ease;
}
.inline-controls button:active { transform: scale(0.92); background: rgba(255, 255, 255, 0.08); }

/* Độc quyền màu sắc điểm nhấn nhẹ cho nút cộng/trừ */
.m { color: #f43f5e !important; } /* Hồng đỏ hiện đại */
.p { color: #10b981 !important; } /* Xanh lục bảo hiện đại */

/* ĐIỂM SỐ NỔI BẬT */
.score {
    min-width: 55px;
    text-align: center;
    font-size: 36px;
    font-weight: 700;
    font-variant-numeric: tabular-nums; /* Giữ số không bị lệch dịch chuyển khi nhảy số */
    line-height: 1;
}

/* CO GIÃN THEO ĐỘ ĐÔNG NGƯỜI */
.count-5 .score, .count-6 .score { font-size: 28px; }
.count-5 .inline-controls button, .count-6 .inline-controls button { width: 38px; height: 38px; border-radius: 10px; }
.count-5 input.name, .count-6 input.name { font-size: 15px; }

/* THAO TÁC PHỤ */
.card-actions {
    position: absolute;
    top: 4px;
    left: 20px;
    display: flex;
    gap: 12px;
    z-index: 2;
    opacity: 0;
    transition: opacity 0.2s ease;
}
.card:hover .card-actions, .card:active .card-actions { opacity: 0.4; }
.card-actions:hover { opacity: 1 !important; }

.color-picker-wrapper {
    position: relative;
    font-size: 11px;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
}
.color-picker-wrapper input[type="color"] {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    opacity: 0; cursor: pointer;
}

.del-btn {
    background: none;
    border: none;
    color: #f43f5e;
    font-size: 11px;
    cursor: pointer;
    padding: 0;
    display: flex;
    align-items: center;
    gap: 4px;
}

/* SVG ICONS */
.icon {
    width: 14px;
    height: 14px;
    fill: currentColor;
    display: inline-block;
    vertical-align: middle;
}
.btn-icon {
    width: 20px;
    height: 20px;
    fill: currentColor;
}

/* DASHBOARD TỔNG ĐIỂM ĐÁY */
.total {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 500px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: 16px 16px calc(14px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    z-index: 999;
}
.total-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.glow-circle {
    background: var(--card-bg);
    border: 1px solid var(--border);
    min-width: 140px;
    height: 40px;
    border-radius: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
}
.big { font-size: 20px; font-weight: 700; color: var(--text-main); }

.total button {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 8px;
    transition: color 0.2s;
}
.total button:active { color: #f43f5e; }
</style>
</head>
<body>

<div class="wrap">
    <!-- TOP APP BAR -->
    <div class="top">
        <h1>Scoreboard</h1>
        <div class="top-actions">
            <button onclick="add()">
                <svg class="icon" viewBox="0 0 24 24"><path d="M19 11H13V5H11V11H5V13H11V19H13V13H19V11Z"/></svg> Thêm người
            </button>
        </div>
    </div>
    
    <!-- CONTAINER THẺ NGƯỜI CHƠI CHIA HÀNG NGANG ĐỀU NHAU -->
    <div id="list"></div>
</div>

<!-- DASHBOARD TỔNG ĐIỂM -->
<div class="total">
    <div class="total-label">Tổng số điểm toàn bàn</div>
    <div class="glow-circle">
        <div id="tot" class="big">0</div>
    </div>
    <button onclick="reset()">
        <svg class="icon" viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg> Reset trận
    </button>
</div>

<script>
// Đồng bộ đồng nhất màu chữ mặc định cho tất cả cơ thủ là màu trắng tinh tế
const DEFAULT_TEXT_COLOR = "#ffffff"; 
const DEFAULT_PLAYERS = [{"name":"Cơ thủ 1","score":0,"color":DEFAULT_TEXT_COLOR},{"name":"Cơ thủ 2","score":0,"color":DEFAULT_TEXT_COLOR}];

let a = [...DEFAULT_PLAYERS];
if(localStorage.bida_modern) {
    try { a = JSON.parse(localStorage.bida_modern); } catch(e) {}
}

function save(){ localStorage.bida_modern = JSON.stringify(a); }

function draw(){
    let listNode = document.getElementById('list');
    listNode.innerHTML = '';
    
    listNode.className = 'count-' + Math.min(a.length, 6);
    
    let t = 0;
    a.forEach((x, i) => {
        t += x.score;
        if(!x.color) x.color = DEFAULT_TEXT_COLOR;
        
        listNode.innerHTML += `
        <div class="card">
            <!-- THAO TÁC PHỤ (Ẩn khéo léo, di chuột hoặc chạm nhẹ vào thẻ sẽ hiện) -->
            <div class="card-actions">
                <div class="color-picker-wrapper">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9 0 2.12.74 4.07 1.97 5.61L4.35 19.4c-.39.39-.39 1.02 0 1.41.39.39 1.02.39 1.41 0l1.9-1.9C9.22 19.58 10.57 20 12 20c4.97 0 9-4.03 9-9s-4.03-9-9-9zm0 15c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6z"/></svg> Đổi màu chữ
                    <input type="color" value="${x.color}" onchange="changeColor(${i}, this.value)">
                </div>
                <button class="del-btn" onclick="removePlayer(${i})">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg> Xóa
                </button>
            </div>
            
            <!-- BÊN TRÁI: TÊN CƠ THỦ -->
            <div class="player-info">
                <input class="name" value="${x.name}" onchange="a[${i}].name=this.value;save()">
            </div>
            
            <!-- BÊN PHẢI: BỘ ĐIỀU KHIỂN ĐIỂM SỐ CHUNG HÀNG -->
            <div class="inline-controls">
                <button class="m" onclick="chg(${i},-1)">
                    <svg class="btn-icon" viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"/></svg>
                </button>
                <div class="score" style="color: ${x.color};">
                    ${x.score > 0 ? '+' : ''}${x.score}
                </div>
                <button class="p" onclick="chg(${i},1)">
                    <svg class="btn-icon" viewBox="0 0 24 24"><path d="M19 11H13V5H11V11H5V13H11V19H13V13H19V11Z"/></svg>
                </button>
            </div>
        </div>`;
    });
    document.getElementById('tot').innerHTML = t;
    save();
}

function chg(i, d){
    a[i].score += d;
    draw();
}

function changeColor(i, newColor){
    a[i].color = newColor;
    draw();
}

function add(){
    if (a.length >= 6) {
        alert("Ứng dụng hỗ trợ tối đa 6 hàng để đảm bảo trải nghiệm hiển thị đẹp nhất!");
        return;
    }
    a.push({name: 'Cơ thủ ' + (a.length + 1), score: 0, color: DEFAULT_TEXT_COLOR});
    draw();
}

function removePlayer(i){
    if(confirm(`Xóa cơ thủ "${a[i].name}"?`)){
        a.splice(i, 1);
        draw();
    }
}

function reset(){
    if(confirm("Làm mới toàn bộ điểm số?")){
        a.forEach(x => x.score = 0);
        draw();
    }
}

draw();
</script>

</body>
</html>
