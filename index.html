<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Modern Scoreboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
<style>
:root {
    --bg-grad: linear-gradient(135deg, #E8EEF5 0%, #C9D6E8 100%);
    --card-bg: rgba(255, 255, 255, 0.55);
    --text-main: #111827;
    --accent: #2563EB;
    --btn-plus: #22C55E;
    --btn-minus: #EF4444;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
    margin: 0;
    background: var(--bg-grad);
    background-attachment: fixed;
    font-family: 'Inter', sans-serif;
    color: var(--text-main);
    min-height: 100vh;
    padding: 20px;
    display: flex;
    justify-content: center;
}

.app { width: 100%; max-width: 450px; }

header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
}

h1 { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 28px; margin: 0; }

/* Card Style */
.card {
    background: var(--card-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.8);
    border-radius: 35px;
    padding: 25px;
    margin-bottom: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

.player-name { font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 18px; margin-bottom: 10px; }

.score-display {
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
    font-size: 80px; /* Tối ưu cho mobile */
    text-align: center;
    color: var(--text-main);
    margin: 10px 0;
}

/* Button Pill Style */
.controls { display: flex; gap: 15px; justify-content: center; }

.btn {
    border: none;
    padding: 12px 30px;
    border-radius: 50px;
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    color: white;
    cursor: pointer;
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.btn:active { transform: scale(0.9); }
.btn-plus { background-color: var(--btn-plus); }
.btn-minus { background-color: var(--btn-minus); }

/* History List */
.history {
    margin-top: 15px;
    padding-top: 15px;
    border-top: 1px solid rgba(0,0,0,0.05);
    font-size: 12px;
    color: #64748b;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    min-height: 20px;
}
.tag { background: rgba(0,0,0,0.05); padding: 2px 8px; border-radius: 10px; }

button.reset {
    background: none; border: none; font-family: 'Inter'; color: #64748b; cursor: pointer;
}
</style>
</head>
<body>

<div class="app">
    <header>
        <h1>Scoreboard</h1>
        <button class="reset" onclick="resetAll()">Làm mới</button>
    </header>
    
    <div id="list"></div>
</div>

<script>
let data = JSON.parse(localStorage.getItem('bida_data')) || [
    {name: "Cơ thủ 1", score: 0, history: []},
    {name: "Cơ thủ 2", score: 0, history: []}
];

function save() {
    localStorage.setItem('bida_data', JSON.stringify(data));
    render();
}

function updateScore(index, delta) {
    data[index].score += delta;
    data[index].history.push(delta > 0 ? `+${delta}` : delta);
    if(data[index].history.length > 5) data[index].history.shift();
    save();
}

function resetAll() {
    if(confirm("Làm mới tất cả điểm?")) {
        data.forEach(p => { p.score = 0; p.history = []; });
        save();
    }
}

function render() {
    const list = document.getElementById('list');
    list.innerHTML = data.map((p, i) => `
        <div class="card">
            <div class="player-name">${p.name}</div>
            <div class="score-display">${p.score}</div>
            <div class="controls">
                <button class="btn btn-minus" onclick="updateScore(${i}, -1)">-1</button>
                <button class="btn btn-plus" onclick="updateScore(${i}, 1)">+1</button>
            </div>
            <div class="history">
                ${p.history.map(h => `<span class="tag">${h}</span>`).join('')}
            </div>
        </div>
    `).join('');
}

render();
</script>
</body>
</html>
