<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>SCORE - Premium Billiards Board</title>
<!-- FONT CHỮ SORA SIÊU SANG TRỌNG -->
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<!-- ICON FONTAWESOME PRO -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
:root {
    --bg: #060913;
    --grad: radial-gradient(circle at top, #111c35 0%, #060913 100%);
    --text-color: #f8fafc;
    --card-bg: rgba(30, 41, 59, 0.4);
    --shadow: rgba(0, 0, 0, 0.5);
    --neon-main: #38bdf8;
    --input-border: rgba(255,255,255,0.1);
}

* { box-sizing: border-box; font-family: 'Sora', sans-serif; -webkit-tap-highlight-color: transparent; }

body {
    margin: 0;
    background: var(--grad);
    color: var(--text-color);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: background 0.4s, color 0.4s;
}

.wrap {
    width: 100%;
    max-width: 500px;
    margin: 0 auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

/* TOP APP BAR */
.top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    flex-shrink: 0;
}
.top h1 {
    margin: 0;
    font-size: 26px;
    font-weight: 900;
    letter-spacing: 2px;
    background: linear-gradient(to right, var(--text-color), rgba(148, 163, 184, 0.8));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.top-actions {
    display: flex;
    gap: 8px;
}

.top button {
    height: 36px;
    padding: 0 12px;
    border: 1px solid var(--input-border);
    border-radius: 12px;
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    color: inherit;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
}
.top button:active { transform: scale(0.95); background: rgba(255,255,255,0.1); }

/* BẢNG ĐIỀU CHỈNH GIAO DIỆN */
.theme-panel {
    background: rgba(15, 23, 42, 0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--input-border);
    border-radius: 20px;
    padding: 12px;
    margin-bottom: 12px;
    display: none;
    flex-direction: column;
    gap: 12px;
    box-shadow: 0 10px 30px var(--shadow);
    z-index: 1000;
    flex-shrink: 0;
}

.theme-presets {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    border-bottom: 1px solid var(--input-border);
    padding-bottom: 10px;
}
.preset-btn {
    padding: 6px;
    border: 1px solid var(--input-border);
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
    color: inherit;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
}
.preset-btn.reset-mode { color: #f43f5e; border-color: rgba(244, 63, 94, 0.2); }

.theme-custom {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
}
.theme-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 700;
    opacity: 0.8;
}
.theme-item input[type="color"] {
    width: 100%;
    height: 32px;
    border: 1px solid var(--input-border);
    border-radius: 8px;
    background: none;
    cursor: pointer;
}

/* LƯỚI CONTAINER HÍT FULL MÀN HÌNH */
#list {
    display: grid;
    gap: 12px;
    flex: 1;
    margin-bottom: 110px; /* Tránh đè lên tổng điểm */
}

/* Chia lưới tự động */
#list.count-1 { grid-template-rows: 1fr; }
#list.count-2 { grid-template-rows: 1fr 1fr; }
#list.count-3 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
#list.count-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
#list.count-5, #list.count-6 { grid-template-columns: 1fr 1fr; grid-template-rows: repeat(3, 1fr); }

/* THẺ CƠ THỦ */
.card {
    background: var(--card-bg);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.04);
    border-radius: 24px;
    padding: 12px 16px;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center; /* Căn giữa nội dung theo chiều dọc */
    gap: 8px;
    overflow: hidden;
    height: 100%;
}

#list.count-3 .card:nth-child(3) {
    grid-column: span 2;
}

/* NÚT CHỌN MÀU VÀ XÓA GÓC TRÊN */
.card-actions {
    position: absolute;
    top: 8px;
    right: 8px;
    display: flex;
    gap: 6px;
    z-index: 2;
}

.color-picker-wrapper {
    position: relative;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 1px solid var(--input-border);
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.05);
    font-size: 10px;
}
.color-picker-wrapper input[type="color"] {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    opacity: 0; cursor: pointer;
}

.del-btn {
    background: rgba(244, 63, 94, 0.08);
    border: 1px solid rgba(244, 63, 94, 0.15);
    color: #f43f5e;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    font-size: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Ô NHẬP TÊN CƠ THỦ */
input.name {
    background: none;
    border: none;
    color: inherit;
    text-align: center;
    font-size: 15px;
    font-weight: 700;
    width: 60%;
    display: block;
    margin: 0 auto;
}
input.name:focus { outline: none; border-bottom: 2px solid var(--neon-main); }

/* HÀNG CỘNG TRỪ ĐIỂM SỐ GỘP CHUNG ( <  -  0  +  > ) */
.inline-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 280px;
    margin: 0 auto;
    gap: 12px;
}

.inline-controls button {
    width: 46px;
    height: 46px;
    border: none;
    border-radius: 50%; /* Làm nút tròn ôm sát hai bên */
    font-size: 20px;
    font-weight: 800;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.05s ease;
    flex-shrink: 0;
}

.m { background: linear-gradient(180deg, #b91c1c 0%, #991b1b 100%); border-bottom: 3px solid #450a0a; }
.m:active { border-bottom: 1px solid #450a0a; transform: translateY(2px); }

.p { background: linear-gradient(180deg, #047857 0%, #065f46 100%); border-bottom: 3px solid #022c22; }
.p:active { border-bottom: 1px solid #022c22; transform: translateY(2px); }

/* ĐIỂM SỐ NẰM CHÍNH GIỮA NÚT CỘNG VÀ TRỪ */
.score {
    flex: 1;
    text-align: center;
    font-size: 46px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: -1px;
}
/* Thu nhỏ nhẹ font chữ điểm nếu chia nhiều ô lưới */
.count-3 .score, .count-4 .score, .count-5 .score, .count-6 .score { font-size: 36px; }
.count-3 .inline-controls button, .count-4 .inline-controls button, .count-5 .inline-controls button, .count-6 .inline-controls button { width: 40px; height: 40px; font-size: 16px; }

/* DASHBOARD TỔNG ĐIỂM CỐ ĐỊNH Ở ĐÁY */
.total {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 500px;
    background: var(--bg);
    background: linear-gradient(to top, var(--bg) 85%, rgba(6,9,19,0) 100%);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--input-border);
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    z-index: 999;
}
.total-label {
    font-size: 10px;
    font-weight: 800;
    opacity: 0.5;
    text-transform: uppercase;
    letter-spacing: 1.5px;
}

.glow-circle {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--input-border);
    min-width: 140px;
    height: 38px;
    border-radius: 19px;
    display: flex;
    justify-content: center;
    align-items: center;
}
.big { font-size: 22px; font-weight: 900; color: inherit; }

.total button {
    background: none;
    border: none;
    color: inherit;
    opacity: 0.5;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 8px;
}
.total button:active { color: #f43f5e; opacity: 1; }
</style>
</head>
<body>

<div class="wrap">
    <!-- TOP APP BAR -->
    <div class="top">
        <h1>SCORE</h1>
        <div class="top-actions">
            <button onclick="toggleThemePanel()"><i class="fa-solid fa-palette"></i> Màu</button>
            <button onclick="add()"><i class="fa-solid fa-plus"></i> Người</button>
        </div>
    </div>
    
    <!-- BẢNG ĐIỀU CHỈNH GIAO DIỆN -->
    <div id="themePanel" class="theme-panel">
        <div class="theme-presets">
            <button class="preset-btn" onclick="setPreset('day')"><i class="fa-solid fa-sun"></i> Ngày</button>
            <button class="preset-btn" onclick="setPreset('night')"><i class="fa-solid fa-moon"></i> Đêm</button>
            <button class="preset-btn reset-mode" onclick="setPreset('default')"><i class="fa-solid fa-arrow-rotate-left"></i> Gốc</button>
        </div>
        <div class="theme-custom">
            <div class="theme-item">
                <span>Nền</span>
                <input type="color" id="cfgBg" onchange="updateTheme('bg', this.value)">
            </div>
            <div class="theme-item">
                <span>Chữ</span>
                <input type="color" id="cfgText" onchange="updateTheme('text', this.value)">
            </div>
            <div class="theme-item">
                <span>Ô (Card)</span>
                <input type="color" id="cfgCard" onchange="updateTheme('card', this.value)">
            </div>
        </div>
    </div>
    
    <!-- CONTAINER THẺ NGƯỜI CHƠI -->
    <div id="list"></div>
</div>

<!-- DASHBOARD TỔNG ĐIỂM -->
<div class="total">
    <div class="total-label">Tổng điểm toàn bàn</div>
    <div class="glow-circle">
        <div id="tot" class="big">0</div>
    </div>
    <button onclick="reset()"><i class="fa-solid fa-arrow-rotate-left"></i> Làm mới trận</button>
</div>

<script>
const DEFAULT_THEME = {bg: "#060913", text: "#f8fafc", card: "rgba(30, 41, 59, 0.4)", grad: "radial-gradient(circle at top, #111c35 0%, #060913 100%)", border: "rgba(255,255,255,0.1)"};
const DEFAULT_PLAYERS = [{"name":"Cơ thủ 1","score":0,"color":"#38bdf8"},{"name":"Cơ thủ 2","score":0,"color":"#a855f7"}];

let sysTheme = {...DEFAULT_THEME};
if(localStorage.bidaTheme) {
    try { sysTheme = JSON.parse(localStorage.bidaTheme); } catch(e) {}
}

let a = [...DEFAULT_PLAYERS];
if(localStorage.bida2) {
    try { a = JSON.parse(localStorage.bida2); } catch(e) {}
}

function save(){ localStorage.bida2 = JSON.stringify(a); }

function applySystemTheme() {
    document.documentElement.style.setProperty('--bg', sysTheme.bg);
    document.documentElement.style.setProperty('--grad', sysTheme.grad || sysTheme.bg);
    document.documentElement.style.setProperty('--text-color', sysTheme.text);
    document.documentElement.style.setProperty('--card-bg', sysTheme.card);
    document.documentElement.style.setProperty('--input-border', sysTheme.border || 'rgba(255,255,255,0.1)');
    
    document.getElementById('cfgBg').value = sysTheme.bg.startsWith('rgba') || sysTheme.bg.startsWith('radial') ? '#060913' : sysTheme.bg;
    document.getElementById('cfgText').value = sysTheme.text;
    document.getElementById('cfgCard').value = sysTheme.card.startsWith('rgba') ? '#1e293b' : sysTheme.card;
    localStorage.bidaTheme = JSON.stringify(sysTheme);
}

function updateTheme(type, value) {
    sysTheme[type] = value;
    if (type === 'bg') sysTheme.grad = value;
    applySystemTheme();
}

function setPreset(mode) {
    if (mode === 'default') {
        if(confirm("Khôi phục giao diện gốc?")) {
            sysTheme = {...DEFAULT_THEME};
            a.forEach((x, i) => { if(DEFAULT_PLAYERS[i]) x.color = DEFAULT_PLAYERS[i].color; else x.color = '#38bdf8'; });
            applySystemTheme();
            draw();
        }
    } else if (mode === 'day') {
        sysTheme = { bg: "#f1f5f9", grad: "radial-gradient(circle at top, #ffffff 0%, #f1f5f9 100%)", text: "#0f172a", card: "rgba(255, 255, 255, 0.7)", border: "rgba(0,0,0,0.08)" };
        applySystemTheme();
    } else if (mode === 'night') {
        sysTheme = {...DEFAULT_THEME};
        applySystemTheme();
    }
}

function toggleThemePanel() {
    let panel = document.getElementById('themePanel');
    panel.style.display = (panel.style.display === 'flex') ? 'none' : 'flex';
}

function draw(){
    let listNode = document.getElementById('list');
    listNode.innerHTML = '';
    
    listNode.className = 'count-' + Math.min(a.length, 6);
    
    let t = 0;
    a.forEach((x, i) => {
        t += x.score;
        if(!x.color) x.color = '#38bdf8';
        
        // CẤU TRÚC HÀNG NGANG: [-] ĐIỂM SỐ [+]
        listNode.innerHTML += `
        <div class="card" style="border-color: ${x.color}33; box-shadow: 0 10px 20px var(--shadow), 0 0 15px ${x.color}10;">
            <div class="card-actions">
                <div class="color-picker-wrapper" style="color: ${x.color}">
                    <i class="fa-solid fa-droplet"></i>
                    <input type="color" value="${x.color}" onchange="changeColor(${i}, this.value)">
                </div>
                <button class="del-btn" onclick="removePlayer(${i})"><i class="fa-solid fa-trash-can"></i></button>
            </div>
            <div>
                <input class="name" value="${x.name}" onchange="a[${i}].name=this.value;save()">
            </div>
            <div class="inline-controls">
                <button class="m" onclick="chg(${i},-1)"><i class="fa-solid fa-minus"></i></button>
                <div class="score" style="color: ${x.color}; text-shadow: 0 2px 10px ${x.color}44;">
                    ${x.score > 0 ? '+' : ''}${x.score}
                </div>
                <button class="p" onclick="chg(${i},1)"><i class="fa-solid fa-plus"></i></button>
            </div>
        </div>`;
    });
    document.getElementById('tot').innerHTML = t;
    save();
}

function chg(i, d){
    a[i].score += d;
    draw();
}

function changeColor(i, newColor){
    a[i].color = newColor;
    draw();
}

function add(){
    if (a.length >= 6) {
        alert("Ứng dụng hỗ trợ tối đa gom 6 cơ thủ chung 1 khung hình để đảm bảo hiển thị đẹp nhất!");
        return;
    }
    const colors = ['#38bdf8', '#10b981', '#f43f5e', '#a855f7', '#f59e0b', '#ec4899'];
    const randomColor = colors[a.length % colors.length];
    a.push({name: 'Cơ thủ ' + (a.length + 1), score: 0, color: randomColor});
    draw();
}

function removePlayer(i){
    if(confirm(`Xóa cơ thủ "${a[i].name}" khỏi bàn?`)){
        a.splice(i, 1);
        draw();
    }
}

function reset(){
    if(confirm("Làm mới điểm số trận đấu?")){
        a.forEach(x => x.score = 0);
        draw();
    }
}

applySystemTheme();
draw();
</script>

</body>
</html>
